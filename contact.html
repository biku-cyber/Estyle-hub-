<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Style Hub</title>
  <meta name="description" content="Get in touch with Style Hub — phone, WhatsApp, map and opening hours." />
  <meta property="og:title" content="Contact — Style Hub" />
  <meta property="og:description" content="Reach us by phone, WhatsApp, or visit the shop." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#f5b301" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="nav-mount"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Say <span class="text-gradient">Hello</span></h1>
        <p>Questions, group bookings, or just want to chat? We're here.</p>
      </div>
    </section>

    <section class="section" style="padding-top:0;">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info">
            <div class="info-card reveal">
              <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
              <div><h4>Phone</h4><p><a data-site-phone href="#">—</a></p></div>
            </div>
            <div class="info-card reveal">
              <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
              <div><h4>WhatsApp</h4><p><a data-site-whatsapp href="#" target="_blank" rel="noopener">—</a></p></div>
            </div>
            <div class="info-card reveal">
              <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
              <div><h4>Email</h4><p><a data-site-email href="#">—</a></p></div>
            </div>
            <div class="info-card reveal">
              <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
              <div><h4>Location</h4><p data-site-address>—</p></div>
            </div>
            <div class="info-card reveal">
              <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div style="flex:1;"><h4>Opening Hours</h4>
                <ul data-site-hours style="list-style:none; display:grid; gap:.35rem; margin-top:.5rem; font-size:.9rem; color: var(--text-muted);"></ul>
              </div>
            </div>
          </div>

          <div class="reveal">
            <div class="map-placeholder">
              <div style="text-align:center;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <p style="margin-top:.75rem;" data-site-address>—</p>
                <p class="text-muted" style="font-size:.85rem;">Map integration placeholder — add Google Maps embed key.</p>
              </div>
            </div>
            <div class="flex gap-2 mt-4" style="justify-content: center;">
              <a class="btn btn-secondary" data-site-whatsapp href="#" target="_blank" rel="noopener">Message on WhatsApp</a>
              <a class="btn btn-primary" href="/booking.html">Book Appointment</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-mount"></div>

  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
