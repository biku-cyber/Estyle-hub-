<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Style Hub Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
  <style>
    .admin-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100dvh; }
    @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } }
    .admin-side {
      background: var(--bg-elev); border-right: 1px solid var(--border);
      padding: 1.5rem 1rem; position: sticky; top: 0; align-self: start; height: 100dvh; overflow-y: auto;
    }
    .admin-side .brand { margin-bottom: 2rem; padding: .5rem; }
    .admin-tabs { display: grid; gap: .25rem; list-style: none; }
    .admin-tabs [data-tab] {
      width: 100%; text-align: left; padding: .7rem 1rem; border-radius: var(--radius-sm);
      color: var(--text-muted); font-size: .9rem; cursor: pointer;
    }
    .admin-tabs [data-tab]:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .admin-tabs [data-tab].active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #000; font-weight: 600; }
    .admin-main { padding: 2rem; overflow-x: hidden; }
    .admin-header { display:flex; justify-content: space-between; align-items:center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    th { color: var(--text-muted); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-side">
      <div class="brand"><img src="/assets/logo.svg" alt="" style="height:28px;" /></div>
      <ul class="admin-tabs" role="tablist">
        <li><button data-tab="dashboard" class="active">Dashboard</button></li>
        <li><button data-tab="haircuts">Haircuts</button></li>
        <li><button data-tab="services">Services</button></li>
        <li><button data-tab="bookings">Bookings</button></li>
        <li><button data-tab="barbers">Barbers</button></li>
        <li><button data-tab="reviews">Reviews</button></li>
        <li><button data-tab="offers">Offers</button></li>
        <li><button data-tab="settings">Settings</button></li>
      </ul>
      <div style="margin-top: 2rem;">
        <a href="/home.html" class="btn btn-secondary btn-sm btn-block">← View site</a>
        <button id="logoutBtn" class="btn btn-ghost btn-sm btn-block" style="margin-top:.5rem;">Sign out</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div>
          <h1 style="font-size: 1.75rem;">Dashboard</h1>
          <p class="text-muted" style="font-size:.9rem;">Manage every piece of your salon experience.</p>
        </div>
        <a href="/booking.html" target="_blank" class="btn btn-primary btn-sm">Open booking form</a>
      </div>

      <section id="panel-dashboard" class="admin-panel">
        <div id="statsGrid" class="stat-grid"></div>
        <div class="card" style="padding: 2rem;">
          <h3>Analytics (placeholder)</h3>
          <p class="text-muted mt-2">Charts and traffic breakdown appear here once analytics are wired up.</p>
        </div>
      </section>

      <section id="panel-haircuts" class="admin-panel hidden"><div id="table-haircuts"></div></section>
      <section id="panel-services" class="admin-panel hidden"><div id="table-services"></div></section>
      <section id="panel-bookings" class="admin-panel hidden"><div id="table-bookings"></div></section>
      <section id="panel-barbers" class="admin-panel hidden"><div id="table-barbers"></div></section>
      <section id="panel-reviews" class="admin-panel hidden"><div id="table-reviews"></div></section>
      <section id="panel-offers" class="admin-panel hidden"><div id="table-offers"></div></section>
      <section id="panel-settings" class="admin-panel hidden"></section>
    </main>
  </div>
  <script src="/js/firebase.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
