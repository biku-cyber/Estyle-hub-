<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Services & Pricing — Style Hub</title>
  <meta name="description" content="Explore our full service menu: haircuts, hair + beard combos, beard trims, hair wash, and face clean." />
  <meta property="og:title" content="Services & Pricing — Style Hub" />
  <meta property="og:description" content="Premium salon services with transparent pricing." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#f5b301" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="nav-mount"></div>
  <main>
    <section class="page-header">
      <div class="container">
        <h1>Services & <span class="text-gradient">Pricing</span></h1>
        <p>Transparent pricing on every ritual. No hidden fees, no upsells — just craft.</p>
      </div>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div id="servicesGrid" class="grid grid-3"></div>
      </div>
    </section>

    <section class="section" style="background: var(--bg-elev);">
      <div class="container">
        <div class="section-header reveal">
          <span class="eyebrow">Our Team</span>
          <h2>Meet Your Barbers</h2>
        </div>
        <div id="barbersGrid" class="grid grid-2" style="max-width: 720px; margin: 0 auto;"></div>
      </div>
    </section>
  </main>
  <div id="footer-mount"></div>

  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await window.StyleHub.init();
      const [services, barbers] = await Promise.all([
        window.StyleHub.list("services"),
        window.StyleHub.list("barbers"),
      ]);
      const sg = document.getElementById("servicesGrid");
      sg.innerHTML = services.map((s) => `
        <article class="card reveal">
          <div class="card-body" style="padding: 2rem;">
            <span class="chip">${s.duration} min</span>
            <h3 class="card-title" style="margin-top:.75rem; font-size:1.4rem;">${s.name}</h3>
            <p class="text-muted" style="margin:.75rem 0 1.5rem;">${s.description}</p>
            <div class="flex-between">
              <span class="card-price" style="font-size:1.6rem;">$${s.price}</span>
              <a href="/booking.html" class="btn btn-primary btn-sm">Book</a>
            </div>
          </div>
        </article>`).join("");

      const bg = document.getElementById("barbersGrid");
      bg.innerHTML = barbers.map((b) => `
        <div class="barber-card reveal">
          <div class="barber-avatar">${b.initial}</div>
          <h3>${b.name}</h3>
          <p class="text-muted">${b.role}</p>
          <p class="text-accent" style="margin-top:.5rem; font-size:.9rem;">${b.years} years of experience</p>
        </div>`).join("");

      requestAnimationFrame(() => document.querySelectorAll(".reveal").forEach((e) => e.classList.add("in")));
    });
  </script>
</body>
</html>
